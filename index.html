<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature & Travel Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Nature & Travel Gallery</h1>
    <p class="subtitle">Mountains • Beaches • Forests</p>

    <!-- Category Filters -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('mountain')">Mountains</button>
        <button onclick="filterImages('beach')">Beaches</button>
        <button onclick="filterImages('forest')">Forests</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

    </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>

    <button class="nav left" onclick="prevImage()">❮</button>

    <div class="lightbox-content">
        <img id="lightbox-img">

        <div class="image-filters">
            <button onclick="applyFilter('none')">Normal</button>
            <button onclick="applyFilter('grayscale(100%)')">Grayscale</button>
            <button onclick="applyFilter('sepia(100%)')">Sepia</button>
            <button onclick="applyFilter('blur(3px)')">Blur</button>
            <button onclick="applyFilter('brightness(120%)')">Bright</button>git init

            <button onclick="applyFilter('contrast(150%)')">Contrast</button>
            <button onclick="deleteCurrentImage()">Delete</button>
        </div>
    </div>

    <button class="nav right" onclick="nextImage()">❯</button>
</div>

<script src="script.js"></script>
</body>
